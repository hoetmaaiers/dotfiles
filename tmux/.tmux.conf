##### prefix ##################################################################

# Omarchy style prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Reload config (Omarchy uses q)
bind q source-file ~/.tmux.conf \; display "Reloaded!"


##### core options ############################################################

# PATH for commands launched from tmux
set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"

set -g mouse on
set -g focus-events on
set -g set-clipboard on

# If multiple clients attach to the same session, use the larger size
setw -g aggressive-resize on

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep session alive when the last window is killed
set -g detach-on-destroy off

# Faster ESC for vi mode
set -s escape-time 0

# Big history
set -g history-limit 1000000

# Word separators used by copy-mode "select word"
setw -g word-separators ' @"=()[]_-:,.'
setw -ag word-separators "'"

# UI timings
set -g display-panes-time 2000
set -g display-time 4000

# Terminal and truecolor (Omarchy style)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Optional (Omarchy includes this for modern terminals)
set -g allow-passthrough on


##### creating windows/panes in current dir ###################################

bind c new-window -c "#{pane_current_path}"

# Keep default split keys but inherit cwd
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# Extra split aliases (non-conflicting)
bind s split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"


##### copy mode ###############################################################

setw -g mode-keys vi

# Enter copy mode and immediately start vim-style search
bind / copy-mode \; send-keys ?

# Unbind defaults that conflict with copy-pipe style workflows
unbind -T copy-mode-vi Enter
unbind -T copy-mode-vi Space

# Vim selection keys
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Copy on mouse selection end
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel


##### pane navigation + resizing ##############################################

# Select panes (vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (capital vim style)
bind H resize-pane -L 10
bind J resize-pane -D 10
bind K resize-pane -U 10
bind L resize-pane -R 10

# Resize panes without prefix (shift arrows)
bind -n S-Left  resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up    resize-pane -U 2
bind -n S-Down  resize-pane -D 2

# Kill pane without confirmation
bind x kill-pane


##### vim aware pane switching ################################################

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Your old C-Space pane cycle moved here because C-Space is now prefix
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\' 'select-pane -t :.+'


##### windows/sessions ########################################################

# Swap windows (no prefix)
bind-key -n C-S-Left  swap-window -t -1
bind-key -n C-S-Right swap-window -t +1


##### layouts #################################################################

# Equalize panes (keys that do not fight your split bindings)
bind = select-layout even-horizontal
bind + select-layout even-vertical


##### toggles #################################################################

# Sync panes toggle
bind C-s if -F '#{pane_synchronized}' 'setw synchronize-panes off' 'setw synchronize-panes on'


##### status bar (Omarchy theming) ############################################

set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 80
set -g window-status-separator ""

# Theme colors (Omarchy)
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "

# Omarchy right side plus optional continuum indicator
# Remove the " | cont: ..." part if you want pure Omarchy look.
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#[fg=brightblack]#h#[fg=brightblack] | cont: #{continuum_status} "

set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "

set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"

set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue


##### plugins #################################################################

# Keep TPM and your plugins (minus catppuccin + prefix-highlight which conflict with Omarchy look)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-boot 'on'
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
